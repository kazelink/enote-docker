<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#fcfcfd">
    <title>Notes</title>
    <link rel="icon" type="image/svg+xml" href="/assets/enote.svg">
    <link rel="preload" href="/assets/fonts/montserrat-latin.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link href="/assets/fancybox.css" rel="stylesheet">
    <link href="/app.css?v=5.10" rel="stylesheet">
    <script src="/assets/htmx.js" defer></script>
    <script src="/assets/sweetalert2.all.min.js" defer></script>
</head>

<body>

    <div id="auth-overlay">
        <div class="auth-card">
            <div class="c-title">ENTER PASSWORD</div>
            <form id="auth-form" hx-post="/api/login" hx-target="#auth-messages" hx-swap="innerHTML">
                <input type="password" name="password" id="auth-input" required placeholder="" autofocus>
                <button type="submit" class="auth-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M16.172 11l-5.364-5.364 1.414-1.414L20 12l-7.778 7.778-1.414-1.414L16.172 13H4v-2z">
                        </path>
                    </svg>
                </button>
            </form>
            <div id="auth-messages"></div>
        </div>
    </div>

    <div class="d-container">
        <div class="workspace-shell">
            <div class="workspace-side">
                <aside class="workspace-panel sidebar-panel">
                    <div class="panel-head folder-panel-head">
                        <div class="folder-head-tools">
                            <button class="panel-tool-btn" id="btn-tree-toggle" type="button"
                                onclick="App.toggleAllFolders()" aria-label="Collapse all folders">
                                <span id="tree-toggle-label">-</span>
                            </button>
                            <button class="panel-tool-btn" id="btn-folder-dom-toggle" type="button"
                                onclick="App.toggleFolderPanel()" aria-label="Hide folder panel content">
                                <span id="folder-dom-toggle-label">▾</span>
                            </button>
                        </div>
                        <div class="folder-head-actions">
                            <button class="btn-head-icon" id="btn-search-toggle" type="button"
                                onclick="App.toggleSearchBox()" aria-label="Search notes">
                                <svg class="ri-icon" viewBox="0 0 24 24">
                                    <path
                                        d="M10.5 4a6.5 6.5 0 1 0 4.03 11.6l4.43 4.43 1.42-1.42-4.43-4.43A6.5 6.5 0 0 0 10.5 4zm0 2a4.5 4.5 0 1 1 0 9 4.5 4.5 0 0 1 0-9z" />
                                </svg>
                            </button>
                            <button class="btn-new-mini sidebar-new-note" type="button" onclick="App.newEntry()">
                                <svg class="ri-icon" viewBox="0 0 24 24">
                                    <path d="M11 11V5h2v6h6v2h-6v6h-2v-6H5v-2h6z" />
                                </svg>
                                NEW
                            </button>
                        </div>
                    </div>
                    <div id="folder-tree-shell" class="folder-tree-shell">
                        <div id="global-note-tools" class="global-note-tools">
                            <input id="note-search" class="search-input" type="search" placeholder=""
                                onkeydown="App.handleSearchKeydown(event)">
                            <div class="search-actions">
                                <button class="btn-filter" onclick="App.applySearch()">SEARCH</button>
                                <button class="btn-filter secondary" id="search-reset"
                                    onclick="App.clearSearch()">RESET</button>
                            </div>
                        </div>
                        <div id="folder-tree" class="folder-tree"></div>
                    </div>
                </aside>

                <aside class="workspace-panel tags-panel">
                    <div class="panel-head">
                        <span class="panel-title">TAGS</span>
                    </div>
                    <div id="tag-cloud" class="tag-cloud"></div>
                </aside>
            </div>

            <main class="workspace-panel main-panel">
                <div class="card" id="editor-card"></div>

                <div id="editor-wrapper-dom" class="editor-wrapper" style="display:none">
                    <div class="toolbar" id="toolbar">
                        <button class="tb-btn" data-cmd="bold"><i class="ri-bold"></i></button>
                        <button class="tb-btn" data-cmd="italic"><i class="ri-italic"></i></button>
                        <button class="tb-btn" data-cmd="justifyCenter" id="btn-center"><i
                                class="ri-align-center"></i></button>
                        <button class="tb-btn" data-cmd="indentClass" id="btn-indent"><i
                                class="ri-indent-increase"></i></button>
                        <button class="tb-btn" data-cmd="justifyFull" id="btn-justify"><i
                                class="ri-align-justify"></i></button>
                        <button class="tb-btn" data-cmd="formatBlock" data-val="H1">H1</button>
                        <button class="tb-btn" data-cmd="formatBlock" data-val="H2">H2</button>
                        <button class="tb-btn" data-cmd="formatBlock" data-val="blockquote"><i
                                class="ri-double-quotes-l"></i></button>
                        <button class="tb-btn" data-cmd="insertOrderedList" id="btn-ol">
                            <svg class="tb-icon-svg" viewBox="0 0 24 24">
                                <path
                                    d="M2 17h2v.5H3v1h1v.5H2v1h3v-4H2v1zm1-9h1V4H2v1h1v3zm-1 3h1.8L2 13.1v.9h3v-1H3.2L5 10.9V10H2v1zm5-6v2h14V5H7zm0 14h14v-2H7v2zm0-6h14v-2H7v2z" />
                            </svg>
                        </button>
                        <button class="tb-btn" data-cmd="insertUnorderedList" id="btn-ul">
                            <svg class="tb-icon-svg" viewBox="0 0 24 24">
                                <path
                                    d="M8 4h13v2H8V4zm0 6h13v2H8v-2zm0 6h13v2H8v-2zM3 5a1 1 0 1 1 2 0 1 1 0 0 1-2 0zm0 6a1 1 0 1 1 2 0 1 1 0 0 1-2 0zm0 6a1 1 0 1 1 2 0 1 1 0 0 1-2 0z" />
                            </svg>
                        </button>
                        <div class="tb-more-wrapper">
                            <button class="tb-btn tb-more-trigger">
                                <svg class="tb-icon-svg" viewBox="0 0 24 24">
                                    <path
                                        d="M5 12a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm9 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0zm9 0a2 2 0 1 1-4 0 2 2 0 0 1 4 0z" />
                                </svg>
                            </button>
                            <div class="tb-more-panel">
                                <div class="tb-more-panel-inner">
                                    <div class="color-picker-wrapper">
                                        <button class="tb-btn" id="btn-color"><i class="ri-palette-line"></i></button>
                                        <div class="color-dropdown" id="color-dropdown">
                                            <div class="color-options">
                                                <div class="color-option" style="background:#000000"
                                                    data-color="#000000"></div>
                                                <div class="color-option" style="background:#ef4444"
                                                    data-color="#ef4444"></div>
                                                <div class="color-option" style="background:#f59e0b"
                                                    data-color="#f59e0b"></div>
                                                <div class="color-option" style="background:#22c55e"
                                                    data-color="#22c55e"></div>
                                                <div class="color-option" style="background:#3b82f6"
                                                    data-color="#3b82f6"></div>
                                                <div class="color-option" style="background:#a855f7"
                                                    data-color="#a855f7"></div>
                                            </div>
                                        </div>
                                    </div>
                                    <button class="tb-btn" id="btn-hr"><i class="ri-separator"></i></button>
                                    <button class="tb-btn" id="btn-img"><i class="ri-image-add-line"></i></button>
                                    <button class="tb-btn" id="btn-vid">
                                        <svg class="tb-icon-svg-lg" viewBox="0 0 24 24">
                                            <path
                                                d="M2 3.993A1 1 0 0 1 2.992 3h18.016c.548 0 .992.445.992.993v16.014a1 1 0 0 1-.992.993H2.992A.993.993 0 0 1 2 20.007V3.993zM8 5v14h8V5H8zM4 5v2h2V5H4zm14 0v2h2V5h-2zM4 9v2h2V9H4zm14 0v2h2V9h-2zM4 13v2h2v-2H4zm14 0v2h2v-2h-2zM4 17v2h2v-2H4zm14 0v2h2v-2h-2z" />
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <input type="file" id="img-input" name="file" accept="image/jpeg,image/png,image/webp,image/gif"
                            style="display:none">
                        <input type="file" id="vid-input" name="file" accept="video/mp4,video/webm,video/quicktime"
                            style="display:none">
                        <div class="editor-actions">
                            <button class="tb-btn btn-meta-toggle" id="btn-meta-toggle" type="button"
                                aria-label="Hide note details">
                                <svg class="meta-toggle-icon tb-icon-svg" viewBox="0 0 24 24">
                                    <path d="M12 8l6 6H6z" />
                                </svg>
                            </button>
                            <div class="date-wrapper note-date-editor">
                                <span class="date-pill" id="note-date-pill">
                                    <i class="ri-calendar-line"></i>
                                    <span id="note-date-text">DATE</span>
                                </span>
                                <input type="date" class="inp-date" id="n-date">
                            </div>
                            <button id="d-save" class="btn-save-mini">
                                <i class="ri-send-plane-fill"></i><span id="save-txt">SAVE</span>
                            </button>
                            <button class="btn-close-editor" onclick="App.closeEditor()"><i
                                    class="ri-close-line"></i></button>
                        </div>
                    </div>

                    <div class="note-meta-bar" id="note-meta-bar">
                        <input type="text" id="n-title" class="meta-input meta-title" maxlength="120"
                            placeholder="Title">
                        <div class="meta-grid">
                            <div class="meta-dropdown-wrap">
                                <input type="text" id="n-category" class="meta-input" maxlength="60"
                                    placeholder="Primary category">
                                <i class="ri-arrow-down-s-line meta-dropdown-icon"></i>
                            </div>
                            <div class="meta-dropdown-wrap">
                                <input type="text" id="n-subcategory" class="meta-input" maxlength="60"
                                    placeholder="Secondary category">
                                <i class="ri-arrow-down-s-line meta-dropdown-icon"></i>
                            </div>
                            <input type="text" id="n-tags" class="meta-input" maxlength="200"
                                placeholder="Tags, separated by commas">
                        </div>
                    </div>

                    <div id="d-text" class="editor-box" contenteditable="true" spellcheck="false"></div>
                    <div id="img-toolbar" class="img-toolbar">
                        <button class="it-btn" data-w="25">25%</button>
                        <button class="it-btn" data-w="50">50%</button>
                        <button class="it-btn" data-w="75">75%</button>
                        <button class="it-btn" data-w="100">100%</button>
                    </div>
                </div>

                <div class="card main-card">
                    <div class="c-head">
                        <div class="head-left">
                            <button class="btn-back btn-back-head" id="btn-header-back" type="button"
                                onclick="App.goBack()">
                                <svg class="ri-icon" viewBox="0 0 24 24">
                                    <path
                                        d="M7.828 11H20v2H7.828l5.364 5.364-1.414 1.414L4 12l7.778-7.778 1.414 1.414L7.828 11z" />
                                </svg>
                            </button>
                            <span class="c-title" id="c-title-box">NOTES</span>
                        </div>
                        <div class="head-right">
                            <div id="sync-stat" class="sync-stat"></div>
                        </div>
                    </div>

                    <div id="v-index" class="view-container active">
                        <div id="home-entry-list"></div>
                    </div>

                    <div id="v-category" class="view-container">
                        <div id="category-entry-list"></div>
                    </div>

                    <div id="v-list" class="view-container">
                        <div id="entry-list"></div>
                    </div>

                    <div id="v-note" class="view-container">
                        <div id="note-detail"></div>
                    </div>

                    <div id="v-backup" class="view-container">
                        <div class="backup-wrap">
                            <i class="ri-database-2-line backup-icon"></i>
                            <div class="backup-input-wrap">
                                <input type="text" id="backup-category" class="meta-input"
                                    placeholder="Select Category (optional)">
                                <i class="ri-arrow-down-s-line"></i>
                            </div>
                            <div class="backup-actions">
                                <button id="btn-export" class="btn-backup"
                                    onclick="App.downloadBackup()">DOWNLOAD</button>
                                <button id="btn-restore" onclick="App.pickRestoreFile()" class="btn-backup"
                                    type="button">RESTORE</button>
                            </div>
                            <input type="file" id="restore-input" accept=".json,application/json" style="display:none">
                            <div id="restore-msg" class="restore-msg"></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <footer
        style="text-align:center;padding:7px;color:var(--txt-mut);font-size:12px;opacity:0.6;margin-top:auto;width:100%;">
        &copy; <span id="footer-year"></span> <a href="https://github.com/kazelink/enote-docker" target="_blank"
            style="color:inherit;text-decoration:none;">eNote</a>.
    </footer>

    <div id="tree-context-menu" class="tree-context-menu" style="display:none">
        <button class="tree-context-btn" type="button" onclick="App.createCategoryFromContextMenu()">NEW
            CATEGORY</button>
        <button class="tree-context-btn" id="tree-context-subfolder" type="button"
            onclick="App.createSubcategoryFromContextMenu()">NEW SUBFOLDER</button>
        <button class="tree-context-btn" id="tree-context-rename" type="button"
            onclick="App.renameFromContextMenu()">RENAME</button>
    </div>

    <div id="swal-root"></div>

    <script type="module" src="/modules/app.js?v=5.8"></script>
</body>

</html>
